llm:
  provider: local
  nvidia:
    api_key: ${NVIDIA_API_KEY}
    model: meta/llama-3.1-8b-instruct
    base_url: https://integrate.api.nvidia.com/v1
  local:
    url: '1'
    model: '1'
threads:
  token: ${THREADS_TOKEN}
  user_id: ${THREADS_USER_ID}
schedule:
  interval_hours: 4
  max_posts_per_day: 6
  randomize_minutes: 30
posting:
  active_persona: tech_guru
  history_file: config/post_history.json
affiliate:
  enabled: true
  frequency: 5
  links:
  - url: https://amzn.to/xxx
    context: AI関連書籍
    keywords:
    - AI
    - 機械学習
    - Python
  - url: https://amzn.to/yyy
    context: プログラミング学習
    keywords:
    - プログラミング
    - 学習
    - 初心者
